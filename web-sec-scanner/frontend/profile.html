<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile | WebSec Scanner</title>

    <link rel="stylesheet" href="../static/css/dashboard.css">
    <link rel="stylesheet" href="../static/css/profile.css">
    <link rel="stylesheet" href="../static/css/global.css">
    
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="main-header">
        <nav class="navbar">
            <div class="nav-left">
                <h1>WebSec<span>Scanner</span></h1>
                <span class="report-tag">User Profile</span>
            </div>

            <div class="nav-right">
                <!-- <span id="userDisplay" class="user-profile"></span> -->

                <a href="index.html" class="btn-outline">Home</a>
                <a href="scan.html" class="btn-outline">Scan</a>
                <a href="dashboard.html" class="btn-outline">Dashboard</a>
                <a href="history.html" class="btn-outline">History</a>

                <button onclick="logout()" class="nav-btn logout-btn">Logout</button>
            </div>
        </nav>
    </header>

    <!-- ================= MAIN ================= -->
    <div class="container">

        <h2 class="page-title">👤 Profile Settings</h2>

        <!-- ================= PROFILE INFO ================= -->
        <div class="card profile-card">
            <div class="profile-left">

                <!-- CLICK TO UPLOAD IMAGE -->
                <label for="uploadPic" class="profile-pic-wrapper">
                    <img id="profilePic" src="../static/default-avatar.png" alt="Profile">
                    <div class="overlay">Change</div>
                </label>
                <input type="file" id="uploadPic" hidden>

            </div>

            <div class="profile-right">
                <p><strong>Username:</strong> <span id="username"></span></p>
                <p><strong>User ID:</strong> <span id="userid"></span></p>

                <!-- UPDATE USERNAME -->
                <input type="text" id="newUsername" placeholder="Update username">
                <button class="btn" onclick="updateUsername()">Update Username</button>
                <p id="usernameMsg"></p>
            </div>
        </div>

        <!-- ================= SECURITY ================= -->
        <div class="card">
            <h3>🔐 Security Settings</h3>

            <input type="password" id="oldPassword" placeholder="Old Password">
            <input type="password" id="newPassword" placeholder="New Password">

            <button class="btn" onclick="changePassword()">Update Password</button>

            <p id="passwordMsg"></p>
        </div>

        <!-- ================= ACTIVITY ================= -->
        <div class="card">
            <h3>📊 Activity History</h3>

            <button onclick="clearHistory()" class="btn btn-danger">
                Clear Scan History
            </button>

            <table class="vuln-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Target</th>
                        <th>Findings</th>
                    </tr>
                </thead>
                <tbody id="historyTable"></tbody>
            </table>

            <p id="historyMsg"></p>
        </div>

        <!-- ================= SETTINGS ================= -->
        <div class="card">
            <h3>⚙️ Preferences</h3>

            <label class="toggle">
                <input type="checkbox" id="darkModeToggle">
                <span>Enable Dark Mode</span>
            </label>

            <br><br>

            <button class="btn" onclick="downloadReports()">
                Download Reports
            </button>

            <button class="btn btn-danger" onclick="deleteAccount()">
                Delete Account
            </button>
        </div>

    </div>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        <p>© 2026 WebSec Scanner | Built for Security Professionals</p>
    </footer>

    <!-- ================= JS ================= -->
    <script src="../static/js/profile.js"></script>
    <script src="../static/js/theme.js"></script>

</body>

</html>
